<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #sandboxCanvas {
            background: #d9c08a url("images/Untitled-removebg-preview.png") center / contain no-repeat;
        }
    </style>
    <script src="script.js" defer></script>
</head>
<body>
    <label for="gridSizeInput">Grid size:</label>
    <main>
        <h1>Sandbox Pathfinder</h1>
        <input id="gridSizeInput" type="number" step="1" value="32">
        <button id="applyGridSizeButton" type="button">Apply Grid Size</button>
        <button id="findPathButton" type="button">Find Path</button>
        <button id="resetGridButton" type="button">Reset Grid</button>
        <p id="statusMessage">Click the grid to place start, end, and rocks.</p>
        <canvas id="sandboxCanvas" width="800" height="520" aria-label="Pathfinding grid"></canvas>
    </main>
</body>
</html>
